<!DOCTYPE html>
<html>
<head>
	<title>Sosyal Medya Hesapları</title>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css" integrity="sha384-/rXc/GQVaYpyDdyxK+ecHPVYJSN9bmVFBvjA/9eOB+pb3F2w2N6fc5qB9Ew5yIns" crossorigin="anonymous">
	<style>
		body {
			font-family: Arial, sans-serif;
			text-align: center;
		}
		.middle {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		.btn {
			display: inline-block;
			margin: 10px;
			padding: 10px 20px;
			background-color: #008CBA;
			color: white;
			border: none;
			border-radius: 5px;
			font-size: 16px;
			cursor: pointer;
			transition: background-color 0.3s ease;
		}
		.btn:hover {
			background-color: #005F6B;
		}
		.fab {
			margin-right: 5px;
		}
	</style>
</head>
<body>
	<h1>Sosyal Medya Hesapları</h1>
	<div class="middle">
		<a class="btn" href="https://www.facebook.com/">
			<i class="fab fa-facebook-f"></i> Facebook
		</a>
		<a class="btn" href="https://www.twitter.com/">
			<i class="fab fa-twitter"></i> Twitter
		</a>
		<a class="btn" href="https://www.google.com/">
			<i class="fab fa-google"></i> Google
		</a>
		<a class="btn" href="https://www.instagram.com/">
			<i class="fab fa-instagram"></i> Instagram
		</a>
		<a class="btn" href="https://www.youtube.com/">
			<i class="fab fa-youtube"></i> Youtube
		</a>
	</div>
</body>
</html>
