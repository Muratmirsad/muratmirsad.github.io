<!DOCTYPE html>
<html>

<head>
	<title>Murat Mirsad</title>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css"

	<link rel="stylesheet" href="style.css">

<body>
	<center>
		<img class="pp"
			src="https://media.licdn.com/dms/image/D4D03AQGX-Wy4dCgbrA/profile-displayphoto-shrink_200_200/0/1672084871313?e=1684972800&v=beta&t=GQBS8H1z3TmSxo6FJBMcgzkVblXB-j1sI1X7_24btL4"
			alt="Author's Profile Picture" />
	</center>

	<div class="ctr">
		<div onclick="location.replace('https://www.youtube.com/')" class="ndiv ndiv-yt">
			<div class="ndiv1">
				<i class="fab fa-youtube"></i>
			</div>
			<div class="ndiv2">
				<p>YouTube</p>
			</div>
		</div>

		<div onclick="location.replace('https://www.twitter.com/')" class="ndiv ndiv-tw">
			<div class="ndiv1">
				<i class="fab fa-twitter"></i>
			</div>
			<div class="ndiv2">
				<p>Twitter</p>
			</div>
		</div>

		<div onclick="location.replace('https://www.facebook.com/')" class="ndiv ndiv-fb">
			<div class="ndiv1">
				<i class="fab fa-facebook-f"></i>
			</div>
			<div class="ndiv2">
				<p>Facebook</p>
			</div>
		</div>

		<div onclick="location.replace('https://github.com/Muratmirsad')" class="ndiv ndiv-gh">
			<div class="ndiv1">
				<i class="fab fa-github"></i>
			</div>
			<div class="ndiv2">
				<p>GitHub</p>
			</div>
		</div>

		<div onclick="location.replace('https:instagram.com/')" class="ndiv ndiv-ig">
			<div class="ndiv1">
				<i class="fab fa-instagram"></i>
			</div>
			<div class="ndiv2">
				<p>Instagram</p>
			</div>
		</div>
	</div>


</body>

</html>
